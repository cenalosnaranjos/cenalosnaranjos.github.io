<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CETA Los Naranjos | Sistema de Evaluación Profesional</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --primary: #2563eb; --sidebar-bg: #0f172a; --sidebar-text: #94a3b8;
      --bg-main: #f8fafc; --card-bg: #ffffff; --text-dark: #1e293b;
      --border: #e2e8f0; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.dark {
      --bg-main: #020617; --card-bg: #1e293b; --text-dark: #f1f5f9;
      --border: #334155; --sidebar-bg: #000000;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-dark); transition: var(--transition); }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px; background: var(--sidebar-bg); color: white; padding: 1.5rem;
      position: fixed; height: 100vh; overflow-y: auto; z-index: 1000;
      transition: transform 0.3s ease;
    }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; margin-bottom: 2rem; color: white; text-decoration: none; }
    .menu-group { margin-bottom: 1.5rem; }
    .menu-label { font-size: 0.7rem; text-transform: uppercase; color: #475569; letter-spacing: 1px; margin-bottom: 0.5rem; padding-left: 10px; }
    
    .nav-link {
      display: flex; align-items: center; gap: 10px; padding: 12px 16px; color: var(--sidebar-text);
      text-decoration: none; border-radius: 10px; font-size: 0.85rem; margin-bottom: 4px; 
      transition: 0.2s; cursor: pointer; border-left: 4px solid transparent;
    }
    .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-link.active { 
      background: rgba(37, 99, 235, 0.15); 
      color: white; 
      border-left-color: var(--primary);
      font-weight: 600;
    }

    .menu-toggle {
      display: none; background: var(--primary); color: white; border: none;
      padding: 10px; border-radius: 8px; cursor: pointer;
    }

    .sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 999;
    }

    /* --- MAIN CONTENT --- */
    .main-content { margin-left: 280px; min-height: 100vh; }

    .sticky-header {
      position: sticky; top: 0; background: var(--card-bg); z-index: 900;
      padding: 0.8rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .timer-box { background: #fee2e2; color: #991b1b; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-family: monospace; font-size: 1.2rem; }

    .actions-bar { display: flex; gap: 10px; }
    .btn {
      padding: 10px 18px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.2s;
    }
    .btn-grade { background: #059669; color: white; }
    .btn-pdf { background: #1e293b; color: white; display: none; }
    .btn-reset { background: #f1f5f9; color: #1e293b; border: 1px solid var(--border); }
    body.dark .btn-reset { background: #334155; color: white; border-color: #475569; }

    /* --- EXAMEN --- */
    .exam-container { padding: 2rem; max-width: 900px; margin: 0 auto; }
    .question-card {
      background: var(--card-bg); border-radius: 16px; padding: 2rem; margin-bottom: 2rem;
      border: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .question-text { font-size: 1.1rem; font-weight: 600; margin: 15px 0; line-height: 1.6; }
    .options-list { display: grid; gap: 12px; }
    .option {
      padding: 15px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
      transition: 0.2s; display: flex; align-items: center; gap: 12px;
    }
    .option:hover { border-color: var(--primary); }
    .option.selected { border-color: var(--primary); background: rgba(37,99,235,0.1); font-weight: 700; }
    
    .locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
    .ia-diagnostic { background: #eff6ff; border: 2px solid #bfdbfe; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; display: none; color: #1e40af; }

    /* --- MODAL LOGIN --- */
    .login-modal {
        position: fixed; top:0; left:0; width:100%; height:100%;
        background: rgba(0,0,0,0.8); z-index: 2000;
        display: flex; align-items: center; justify-content: center;
        backdrop-filter: blur(5px);
    }
    .login-content {
        background: var(--card-bg); padding: 2.5rem; border-radius: 20px;
        width: 90%; max-width: 400px; text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .input-field {
        width: 100%; padding: 12px; margin: 1rem 0;
        border: 2px solid var(--border); border-radius: 8px;
        font-family: inherit; font-size: 1rem;
    }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .sidebar-overlay.active { display: block; }
      .main-content { margin-left: 0; }
      .menu-toggle { display: block; }
      .sticky-header { padding: 0.8rem 1rem; }
      .btn span { display: none; }
    }
  </style>
</head>
<body>

  <div id="user-modal" class="login-modal">
    <div class="login-content">
        <i data-lucide="user-circle" style="width: 60px; height: 60px; color: var(--primary); margin-bottom: 1rem;"></i>
        <h2 id="modal-title">Bienvenido al Simulador</h2>
        <div id="existing-user-box" style="display:none; margin: 1.5rem 0;">
            <p>Se detectó una sesión activa como:</p>
            <h3 id="current-user-display" style="margin: 0.5rem 0; color: var(--primary);"></h3>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-grade" style="width:100%; justify-content:center;" onclick="confirmUser(true)">Continuar con este usuario</button>
                <button class="btn btn-reset" style="width:100%; justify-content:center;" onclick="showNewUserInput()">Entrar con otro usuario</button>
            </div>
        </div>
        <div id="new-user-box">
            <p>Por favor, ingresa tu nombre para el reporte:</p>
            <input type="text" id="new-user-name" class="input-field" placeholder="Tu nombre completo...">
            <button class="btn btn-grade" style="width:100%; justify-content:center;" onclick="confirmUser(false)">Empezar Simulador</button>
        </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

  <aside class="sidebar" id="sidebar">
    <a href="simuladores-ceta.html" class="sidebar-brand"><i data-lucide="graduation-cap"></i> CETA Los Naranjos</a>
    
    <div class="menu-group">
      <div class="menu-label">Matemáticas</div>
      <div class="nav-link active" id="link-mate2" onclick="loadSim('Matemáticas 2', 'link-mate2')"><i data-lucide="calculator"></i> Simulador 2</div>
     </div>

    <div style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
        <button class="nav-link" style="background:none; border:none; cursor:pointer; width:100%" onclick="toggleDarkMode()">
            <i data-lucide="moon" id="dark-icon"></i> <span id="dark-text">Modo Oscuro</span>
        </button>
        <button class="nav-link" style="background:none; border:none; cursor:pointer; width:100%; color: #ef4444;" onclick="changeUserManual()">
            <i data-lucide="log-out"></i> Cambiar Usuario
        </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="sticky-header">
      <div style="display: flex; gap: 10px; align-items: center;">
        <button class="menu-toggle" onclick="toggleMenu()">
          <i data-lucide="menu"></i>
        </button>
        <button class="btn btn-reset" onclick="reloadCurrentSim()"><i data-lucide="refresh-cw"></i> <span>Reiniciar Test</span></button>
        <div>
            <h2 id="sim-title" style="font-size: 0.9rem;">Simulador de Matemáticas 2</h2>
            <span id="student-name" style="font-size: 0.7rem; color: var(--sidebar-text);">Cargando...</span>
        </div>
      </div>

      <div class="timer-box" id="timer">75:00</div>

      <div class="actions-bar">
        <button class="btn btn-grade" id="btn-grade" onclick="gradeExam()"><i data-lucide="check-circle"></i> <span>Calificar</span></button>
        <button class="btn btn-pdf" id="btn-pdf" onclick="generatePDF()"><i data-lucide="download"></i> <span>Reporte PDF</span></button>
      </div>
    </header>

    <div class="exam-container">
      <div id="ia-box" class="ia-diagnostic"></div>
      <div id="questions-wrapper"></div>
    </div>
  </main>

  <script>
    let currentSimType = 'Matemáticas 2';
    let currentLinkId = 'link-mate2';
    const DB_REAL = [];
    let studentName = "";

    // --- MANEJO DE USUARIOS ---
    function checkUserSession() {
        const session = JSON.parse(localStorage.getItem('ceta_session'));
        const modal = document.getElementById('user-modal');
        const existingBox = document.getElementById('existing-user-box');
        const newBox = document.getElementById('new-user-box');

        modal.style.display = 'flex';

        if(session && session.nombre) {
            document.getElementById('current-user-display').textContent = session.nombre;
            existingBox.style.display = 'block';
            newBox.style.display = 'none';
        } else {
            showNewUserInput();
        }
    }

    function showNewUserInput() {
        document.getElementById('existing-user-box').style.display = 'none';
        document.getElementById('new-user-box').style.display = 'block';
    }

    function confirmUser(keepExisting) {
        if(keepExisting) {
            const session = JSON.parse(localStorage.getItem('ceta_session'));
            studentName = session.nombre;
        } else {
            const inputName = document.getElementById('new-user-name').value.trim();
            if(!inputName) { alert("Por favor ingresa un nombre"); return; }
            studentName = inputName;
            localStorage.setItem('ceta_session', JSON.stringify({ nombre: studentName }));
        }
        
        document.getElementById('student-name').textContent = `Estudiante: ${studentName}`;
        document.getElementById('user-modal').style.display = 'none';
        loadSim(currentSimType, currentLinkId);
    }

    function changeUserManual() {
        localStorage.removeItem('ceta_session');
        location.reload();
    }

    // --- GENERADOR DE 550 PREGUNTAS ÚNICAS (SIN IDs EN EL TEXTO) ---
    function initBancoPreguntas() {
        const temas = [
            { nombre: "Álgebra", vars: ["x", "y", "a", "b"], ops: ["+", "-"] },
            { nombre: "Geometría", figuras: ["rectángulo", "triángulo", "círculo", "rombo"] },
            { nombre: "Trigonometría", fun: ["Sen", "Cos", "Tan"], ang: ["30°", "45°", "60°"] },
            { nombre: "Aritmética", contexto: ["porcentaje", "razón", "proporción"] }
        ];

        for(let i = 1; i <= 550; i++) {
            let t = temas[i % temas.length];
            let q = "";
            let opts = [];
            let ans = i % 4;

            if(t.nombre === "Álgebra") {
                let n1 = (i % 20) + 5;
                let n2 = (i % 10) + 2;
                q = `Determine el valor de ${t.vars[i%4]} en la ecuación: ${n2}${t.vars[i%4]} ${t.ops[i%2]} ${n1} = ${n1 * 2}`;
                opts = [`${t.vars[i%4]} = ${n1}`, `${t.vars[i%4]} = 2`, `${t.vars[i%4]} = 0`, `${t.vars[i%4]} = -${n1}`];
            } 
            else if(t.nombre === "Geometría") {
                let m = (i % 15) + 3;
                let fig = t.figuras[i % 4];
                q = `Calcule el área aproximada de un ${fig} cuyo componente principal mide ${m} unidades.`;
                opts = [`${Math.pow(m, 2)} u²`, `${m * 2} u²`, `${m / 2} u²`, "No se puede determinar"];
            }
            else if(t.nombre === "Trigonometría") {
                q = `¿Cuál es el valor de la función ${t.fun[i%3]} para un ángulo notable de ${t.ang[i%3]}?`;
                opts = ["0.50", "0.86", "1.00", "0.70"];
            }
            else {
                let p = (i % 100) + 1;
                q = `En una sucesión aritmética, si el término inicial es ${i} y la razón es ${p}, ¿cuál es el segundo término?`;
                opts = [`${i + p}`, `${i - p}`, `${i * p}`, `${p}`];
            }

            // Eliminado el prefijo [ID-XXX]
            DB_REAL.push({ id: i, pregunta: q, opciones: opts, correcta: ans, tema: t.nombre });
        }
    }

    initBancoPreguntas();

    let activeQuestions = [];
    let timer;
    let secondsLeft = 4500;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function reloadCurrentSim() {
        if(confirm("¿Deseas reiniciar el simulador? Se generará un nuevo test de 75 preguntas.")) {
            loadSim(currentSimType, currentLinkId);
        }
    }

    function loadSim(tipo, linkId) {
        currentSimType = tipo;
        currentLinkId = linkId;
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        const selectedLink = document.getElementById(linkId);
        if(selectedLink) selectedLink.classList.add('active');

        document.getElementById('sim-title').textContent = `Simulador de ${tipo}`;
        document.getElementById('btn-grade').style.display = 'flex';
        document.getElementById('btn-pdf').style.display = 'none';
        document.getElementById('ia-box').style.display = 'none';

        activeQuestions = [...DB_REAL].sort(() => 0.5 - Math.random()).slice(0, 75).map(q => ({...q, userSelected: null}));
        renderExam();
        resetTimer();
        window.scrollTo({top: 0, behavior: 'smooth'});
        if(window.innerWidth <= 1024 && document.getElementById('sidebar').classList.contains('active')) toggleMenu();
    }

    function renderExam() {
        const wrapper = document.getElementById('questions-wrapper');
        wrapper.innerHTML = activeQuestions.map((q, i) => `
            <div class="question-card" id="q-${i}">
                <div class="locked-overlay" id="lock-${i}"></div>
                <small style="color: var(--primary); font-weight: 700;">PREGUNTA ${i+1} | ${q.tema}</small>
                <div class="question-text">${q.pregunta}</div>
                <div class="options-list">
                    ${q.opciones.map((opt, oi) => `
                        <div class="option" id="opt-${i}-${oi}" onclick="selectOpt(${i}, ${oi})">
                            <strong style="color:var(--primary)">${String.fromCharCode(65+oi)}</strong> ${opt}
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
        if(window.MathJax) MathJax.typeset();
        lucide.createIcons();
    }

    function selectOpt(qIdx, oIdx) {
        activeQuestions[qIdx].userSelected = oIdx;
        document.querySelectorAll(`#q-${qIdx} .option`).forEach(el => el.classList.remove('selected'));
        document.getElementById(`opt-${qIdx}-${oIdx}`).classList.add('selected');
    }

    function resetTimer() {
        clearInterval(timer);
        secondsLeft = 4500;
        timer = setInterval(() => {
            secondsLeft--;
            let m = Math.floor(secondsLeft / 60), s = secondsLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(secondsLeft <= 0) gradeExam();
        }, 1000);
    }

    function gradeExam() {
        clearInterval(timer);
        let correctas = 0;
        let stats = {};
        activeQuestions.forEach((q, i) => {
            document.getElementById(`lock-${i}`).style.display = 'block';
            if(!stats[q.tema]) stats[q.tema] = { total: 0, ok: 0 };
            stats[q.tema].total++;
            const card = document.getElementById(`q-${i}`);
            if(q.userSelected === q.correcta) {
                correctas++; stats[q.tema].ok++;
                card.style.borderLeft = "6px solid #10b981";
            } else {
                card.style.borderLeft = "6px solid #ef4444";
            }
        });
        const nota = ((correctas / 75) * 100).toFixed(2);
        showIA(nota, stats);
        document.getElementById('btn-grade').style.display = 'none';
        document.getElementById('btn-pdf').style.display = 'flex';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function showIA(nota, stats) {
        const box = document.getElementById('ia-box');
        let debiles = Object.keys(stats).filter(t => (stats[t].ok / stats[t].total) < 0.7);
        box.innerHTML = `<h3><i data-lucide="bot"></i> Diagnóstico Clover IA</h3><p>Nota: <strong>${nota}/100</strong></p><p>Reforzar: ${debiles.length > 0 ? debiles.join(', ') : '¡Excelente dominio!'}</p>`;
        box.style.display = 'block';
        lucide.createIcons();
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const nota = document.getElementById('ia-box').querySelector('strong').innerText;
        doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255); doc.text("REPORTE ACADÉMICO CETA", 105, 20, {align: "center"});
        doc.setTextColor(40); doc.text(`Estudiante: ${studentName}`, 15, 45);
        doc.text(`Calificación: ${nota}`, 140, 45);
        const tableBody = activeQuestions.map((q, i) => [i+1, q.tema, q.userSelected !== null ? String.fromCharCode(65 + q.userSelected) : '-', String.fromCharCode(65 + q.correcta), q.userSelected === q.correcta ? 'OK' : 'X']);
        doc.autoTable({ startY: 55, head: [['#', 'TEMA', 'RPTA', 'CORRECTA', 'ESTADO']], body: tableBody, styles: { fontSize: 7 } });
        doc.save(`Reporte_CETA_${studentName}.pdf`);
    }

    function toggleDarkMode() { 
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('dark-text').textContent = isDark ? 'Modo Claro' : 'Modo Oscuro';
        document.getElementById('dark-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    window.onload = () => {
        lucide.createIcons();
        checkUserSession(); // Inicia el flujo de usuario al cargar
    };
  </script>
</body>
</html>
